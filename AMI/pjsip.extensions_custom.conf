[bridge-outbound]
exten => s,1,NoOp(Iniciando flujo hacia Sarah para llamada ID: ${X_CALL_ID})
 same => n,Goto(from-internal-custom,7777,1)

[from-internal-custom]
exten => 8000,1,NoOp(Calling OpenAI SIP)
 same => n,Set(__XAST_UNIQUEID=${CHANNEL(uniqueid)})
 same => n,Set(__XAST_CHANNEL=${CHANNEL(name)})
 same => n,Dial(PJSIP/openai-endpoint,300,b(add-openai-headers^s^1))
 same => n,Hangup()

exten => 90000,1,NoOp(Escalando llamada, enviando 90000 a PBX PROD)
 same => n,Dial(PJSIP/90000@ext-remote,60)
 same => n,Hangup()

exten => 9998,1,NoOp(Llamando al Agente SilverAI en ElevenLabs)
 same => n,Set(PJSIP_SEND_SESSION_REFRESH=request)
 same => n,Set(CALLERID(num)=9998)
 same => n,Set(__X_CALL_ID=${CHANNEL})
 same => n,Set(__X_CALLER_ID=${CALLERID(num)})
 same => n,System(redis-cli -a "578R2DV926J0B1U089SGUB4GD" SETEX "phone:${CALLERID(num)}" 3600 "${CHANNEL}")
 same => n,Dial(PJSIP/elevenlabs-endpoint/sip:9997@sip.rtc.elevenlabs.io,300,b(add-elevenlabs-headers^s^1))
 same => n,Hangup()

exten => 9997,1,NoOp(Llamada de TEST - ElevenLabs)
 same => n,Set(PJSIP_SEND_SESSION_REFRESH=request)
 same => n,Set(CALLERID(num)=9997)
 same => n,Set(X_CALL_ID=${CHANNEL})
 same => n,Set(X_CALLER_ID=${CALLERID(num)})
 same => n,System(redis-cli -a "578R2DV926J0B1U089SGUB4GD" SETEX "phone:${CALLERID(num)}" 3600 "${CHANNEL}")
 same => n,Dial(PJSIP/elevenlabs-endpoint/sip:9997@sip.rtc.elevenlabs.io,300,b(add-elevenlabs-headers^s^1))
 same => n,Hangup()

exten => 9090,1,NoOp(Llamada de SarahIA - ElevenLabs)
 same => n,Set(PJSIP_SEND_SESSION_REFRESH=request)
 same => n,Set(CALLERID(num)=9090)
 same => n,Set(__X_CALL_ID=${CHANNEL})
 same => n,Set(__X_CALLER_ID=${CALLERID(num)})
 same => n,System(redis-cli -a "578R2DV926J0B1U089SGUB4GD" SETEX "phone:${CALLERID(num)}" 3600 "${CHANNEL}")
 same => n,Dial(PJSIP/SarahIA-endpoint/sip:21@sip.rtc.elevenlabs.io,300,b(add-elevenlabs-headers^s^1))
 same => n,Hangup()

exten => 7777,1,NoOp(Iniciando flujo: Humano=${DESTINO_HUMANO} ID=${X_CALL_ID})
 same => n,Set(__ID_LLAMADA=${X_CALL_ID})
 same => n,Set(__NUM_HUMANO=${DESTINO_HUMANO})
 same => n,System(redis-cli -a "578R2DV926J0B1U089SGUB4GD" -p 6380 SETEX "call_status:${ID_LLAMADA}" 3600 "DISPATCHED")

 same => n,Dial(PJSIP/${NUM_HUMANO}@ext-remote,60,U(sub-validar-voz^${ID_LLAMADA}^${NUM_HUMANO})G(from-internal-custom^7777^10))

 same => n(maestro),10,NoOp(Canal maestro detectado, verificando AMD...)
 same => n,GotoIf($["${ES_HUMANO}"="1"]?conectar_eleven:finalizar)

 same => n(humano),20,NoOp(Humano en linea, esperando a Sarah...)
 same => n,Wait(300) ; Mantiene al humano escuchando silencio/musica hasta que el Dial de Sarah lo capture
 same => n,Hangup()

 same => n(conectar_eleven),NoOp(Llamando a ElevenLabs para unirlo al humano...)
 same => n,Dial(PJSIP/SarahIA-endpoint/sip:21@sip.rtc.elevenlabs.io,300,b(add-elevenlabs-headers^s^1(${ID_LLAMADA},${NUM_HUMANO})))

 same => n,Hangup()

 same => n(finalizar),Gosub(handler-finalizar,s,1(${ID_LLAMADA}))
 same => n,Hangup()

[sub-validar-voz]
exten => s,1,NoOp(Validando ID: ${ARG1})
 same => n,AMD()
 same => n,NoOp(Resultado AMD: ${AMDSTATUS})

 same => n,GotoIf($["${AMDSTATUS}"="HUMAN"]?es_humano:es_maquina)

 same => n(es_humano),NoOp(Humano detectado)
 same => n,System(redis-cli -a "578R2DV926J0B1U089SGUB4GD" -p 6380 SETEX "call_status:${ARG1}" 3600 "IN_PROGRESS")
 same => n,Set(ES_HUMANO=1,g)
 same => n,Return()

 same => n(es_maquina),NoOp(Buzon detectado)
 same => n,System(redis-cli -a "578R2DV926J0B1U089SGUB4GD" -p 6380 SETEX "call_status:${ARG1}" 3600 "NOANSWER")
 same => n,Set(ES_HUMANO=0,g)

 same => n,Set(GOSUB_RESULT=CONGESTION)
 same => n,Return()

[handler-finalizar]
exten => s,1,NoOp(Finalizando llamada ID: ${ARG1})
 same => n,Set(ESTADO_DIAL=${DIALSTATUS})
 same => n,Set(NUEVO_STATUS=${IF($["${ESTADO_DIAL}"="ANSWER"]?COMPLETED:${IF($["${ESTADO_DIAL}"="BUSY"]?BUSY:${IF($["${ESTADO_DIAL}"="NOANSWER"]?NOANSWER:FAILED)})})})
 same => n,ExecIf($["${HANGUPCAUSE}"="16"]?Set(NUEVO_STATUS=COMPLETED))
 same => n,System(redis-cli -a "578R2DV926J0B1U089SGUB4GD" -p 6380 SETEX "call_status:${ARG1}" 3600 "${NUEVO_STATUS}")
 same => n,Return()

[add-elevenlabs-headers]
exten => s,1,NoOp(Headers ElevenLabs para ID: ${ARG1})
 same => n,Set(PJSIP_HEADER(add,X-Call-ID)=${ARG1})
 same => n,Set(PJSIP_HEADER(add,X-Caller-ID)=${ARG2})
 same => n,Return()

[add-openai-headers]
exten => s,1,NoOp(Adding OpenAI SIP headers)
 same => n,Set(PJSIP_HEADER(add,X-Ast-UniqueID)=${XAST_UNIQUEID})
 same => n,Set(PJSIP_HEADER(add,X-Ast-Channel)=${XAST_CHANNEL})
 same => n,Return()

[to_SilverAI]
exten => 9998,1,NoOp(Llamada entrante desde PBX PROD a 9998 - enviando a ElevenLabs por SIP)
 same => n,Goto(from-internal-custom,9998,1)


